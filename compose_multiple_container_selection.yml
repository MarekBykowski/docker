      - '${D_B2B_2025_3_VNC_PORT:?error}:5900'
      - '${D_B2B_2025_3_NOVNC_PORT:?error}:6080'
    privileged: true
    hostname: b2b-2025-3
    profiles: ["b2b-2025-3"] # Same name as the service
    networks:
      - network-b2b-yocto-ci-at-all
    #stdin_open: true # docker run -i
    #tty: true        # docker run -t

